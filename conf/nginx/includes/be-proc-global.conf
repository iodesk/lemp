
if ($admin_access_denied) {
    return 403;
}

# Rate limit: 10r/m baseline (1 req per 6 detik refill)
# burst=40 nodelay -> dashboard Newspaper+plugin bisa load normal
# Brute-force tetap kena karena setelah burst habis, refill cuma 10r/m
# Kombinasi dengan fail2ban (3x/5m = ban 6h) yang handle real attack
limit_req zone=wp_login_limit burst=40 nodelay;
limit_conn conn_default 20;

limit_req_status 429;
limit_conn_status 429;

add_header Retry-After 5 always;
