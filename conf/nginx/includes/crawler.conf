# Rule for robots.txt
location = /robots.txt {
    default_type text/plain;
    try_files $uri @dynamic_robots;
    access_log off;
    log_not_found off;
}

# Fallback robots.txt logic
location @dynamic_robots {
    return 200 "User-agent: *
Disallow: /wp-admin/
Disallow: /trackback/
Disallow: /xmlrpc.php
Allow: /wp-admin/admin-ajax.php
Sitemap: https://$host/sitemap.xml
";
}

location = /ads.txt {
    default_type text/plain;
    # 1. Cari file fisik
    # 2. Kalau tidak ada, lempar ke PHP biar ditangani WordPress (plugin)
    try_files $uri /index.php?$args;
    access_log off;
    log_not_found off;
}
