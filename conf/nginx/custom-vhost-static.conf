server {
  listen 80;
  listen [::]:80;
  #LE-SSL listen 443 quic;
  #LE-SSL listen 443 ssl;
  #LE-SSL listen [::]:443 quic;
  #LE-SSL listen [::]:443 ssl;
  #LE-SSL http2 on;
  #LE-SSL http3 on;
  #LE-SSL add_header Alt-Svc 'h3=":443"; ma=86400' always;

  server_name $DOMAIN www.$DOMAIN;

  root /home/$USER/$DOMAIN/public_html;
  index index.html index.htm;

  access_log /home/$USER/logs/$DOMAIN/nginx/access.log;
  error_log /home/$USER/logs/$DOMAIN/nginx/error.log;

  #LE-SSL ssl_certificate /etc/ssl/selfsigned/$DOMAIN.crt;
  #LE-SSL ssl_certificate_key /etc/ssl/selfsigned/$DOMAIN.key;

  include /etc/nginx/includes/security-rules.conf;
  include /etc/nginx/includes/badbot.conf;

  #FILEMANAGER-CONF

  if ($scheme != "https") {
    return 301 https://$host$request_uri;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ^~ /.well-known/acme-challenge/ {
    default_type "text/plain";
    try_files $uri =404;
  }

  include /etc/nginx/includes/static.conf;

  # Deny PHP execution entirely
  location ~ \.php$ {
    deny all;
  }

}
