
stream {
    log_format stream_main '$remote_addr [$time_local] '
                           'protocol=$protocol status=$status bytes_sent=$bytes_sent '
                           'bytes_received=$bytes_received session_time=$session_time '
                           'sni="$ssl_preread_server_name" upstream="$upstream_addr"';
   
    access_log /var/log/nginx/access.log stream_main buffer=64k flush=5s;
    error_log  /var/log/nginx/error.log;

    ssl_preread on;
    map $ssl_preread_server_name $backend_pool {
        hostnames;
        gocat-api.stack.my.id           nginx_internal_http;
        webhook.stack.my.id             nginx_internal_http;
        default                         cloaker_engine;
    }

    upstream cloaker_engine {
        server 127.0.0.1:9443; 
    }
    upstream cloaker_http {
        server 127.0.0.1:980; 
    }
    upstream nginx_internal_http {
        server 127.0.0.1:8443; 
    }

    server {
        listen 443;
        proxy_pass $backend_pool;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;
    }

    server {
        listen 80;
        proxy_pass cloaker_http; 
        proxy_connect_timeout 5s;
    }
}