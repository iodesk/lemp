
map $request_method $is_method_cacheable {
    GET 1;
    HEAD 1;
    default 0;
}

map $request_method $is_forbidden_method {
    default 1;
    GET 0;
    POST 0;
    HEAD 0;
    OPTIONS 0;
    PATCH 0;
    PUT 0;
    DELETE 0;
    PURGE 0;
}

map $http_user_agent $is_mobile {
    default 0;
    ~*(android|iphone|ipad|ipod|blackberry|iemobile|opera\smini) 1;
}

map $http_cookie $cookie_no_cache {
    default 0;

    # WordPress core
    "~*wordpress_logged_in" 1;
    "~*wp-postpass" 1;

    # WooCommerce auto-detection
    "~*woocommerce_items_in_cart" 1;
    "~*woocommerce_cart_hash" 1;
    "~*wp_woocommerce_session" 1;
}

map $request_uri $uri_no_cache {
    default 0;

    # WordPress admin & login
    ~^/wp-admin/ 1;
    ~^/wp-login\.php$ 1;
    ~^/xmlrpc\.php$ 1;

    # WooCommerce (AUTO ENABLED only when visited)
    ~^/cart/ 1;
    ~^/checkout/ 1;
    ~^/my-account/ 1;

    # Optional API protection
    ~^/wp-json/ 0;  # still cache API unless overridden
}

map $http_x_requested_with $is_ajax {
    default 0;
    "XMLHttpRequest" 1;
}

map $http_authorization $auth_no_cache {
    default 0;
    ~.+ 1;
}

map $query_string $has_query {
    "" 0;
    default 1;
}

map $args $query_ok {
    default 0;
    "~*utm_" 1;
    "~*fbclid" 1;
}

map "$is_method_cacheable$cookie_no_cache$uri_no_cache$is_ajax$auth_no_cache$has_query$query_ok" $skip_cache {
    default 1;
    "1000000" 0;   # No query string -> Cache ON
    "1000011" 0;   # Has query + Query OK -> Cache ON
}

map $skip_cache $cache_uri {
    0 $request_uri;
    default "null cache";
}

map $http_accept $avif_suffix {
    default "";
    "~*avif" ".avif";
}

map $http_accept $webp_suffix {
    default "";
    "~*webp" ".webp";
}

map $http_user_agent $is_bad_bot {
    default 0;
    "~*(gpt|openai|claude|anthropic|gemini|bard|bytespider|ccbot|commoncrawl|perplexity)" 1;
    "~*(ahrefs|alexibot|majestic|mj12bot|rogerbot|semalt)" 1;
}

map $request_uri $is_bad_request {
    default 0;

    # whitelist
    "~^/pma/" 0;
    "~^/fm/" 0;

    "~*^/(readme|license|example|legalnotice|installation|changelog)\.(txt|html|md)$" 1;
    "~*\.(old|orig|original|php#|php~|php_bak|save|swo|aspx?|tpl|sh|bash|bak?|cfg|cgi|dll|exe|hg|ini|jsp|log|mdb|out|sql|svn|swp|tar|rdf|gz|zip|bz2|7z|pem|asc|conf|dump)$" 1;
    "~*/(=|\$&|_mm|(wp-)?config\.|cgi-|etc/passwd|muieblack)" 1;
    "~*/\.git" 1;
}

map $http_cf_ipcountry $is_allowed_country {
    default 0;
    ID      1;
}

map $remote_addr $is_admin_whitelist {
    default 0;
    # 1.2.3.4 1;
}

map "$is_allowed_country:$is_admin_whitelist" $admin_access_denied {
    "1:0"   0; # ID, bukan whitelist -> Boleh
    "1:1"   0; # ID, whitelist -> Boleh
    "0:1"   0; # Bukan ID, tapi whitelist -> Boleh
    default 1; # Selain itu, blokir
}

map $is_admin_whitelist $admin_limit_key {
    0 $binary_remote_addr;
    1 ""; # Jika whitelist, key kosong = rate limit mati
}