__UPSTREAM_BLOCK__

server {
  listen 80;
  listen [::]:80;

  #LE-SSL listen 443 ssl;
  #LE-SSL listen [::]:443 ssl;
  #LE-SSL http2 on;
  #LE-SSL http3 on;
  #LE-SSL listen 443 quic;
  #LE-SSL listen [::]:443 quic;
  #LE-SSL add_header Alt-Svc 'h3=":443"; ma=86400' always;

  server_name $DOMAIN www.$DOMAIN;

  access_log /home/$USER/logs/$DOMAIN/nginx/access.log;
  error_log  /home/$USER/logs/$DOMAIN/nginx/error.log;

  #LE-SSL ssl_certificate /etc/ssl/selfsigned/$DOMAIN.crt;
  #LE-SSL ssl_certificate_key /etc/ssl/selfsigned/$DOMAIN.key;

  # ===============================
  # GLOBAL INCLUDES
  # ===============================
  include /etc/nginx/includes/global.conf;
  include /etc/nginx/includes/security-rules.conf;
  include /etc/nginx/includes/badbot.conf;

  # ===============================
  # FORCE HTTPS (SAFE FOR ACME)
  # ===============================
  if ($scheme != "https") {
    return 301 https://$host$request_uri;
  }

  # ===============================
  # ACME CHALLENGE (LE)
  # ===============================
  location ^~ /.well-known/acme-challenge/ {
    allow all;
    root /var/lib/letsencrypt;
    try_files $uri =404;
  }

  # ===============================
  # ROOT HANDLER (ROUTES MODE ONLY)
  # ===============================
  __ROOT_BLOCK__

  # ===============================
  # ROUTES MODE (SUBPATH PROXY)
  # ===============================
  __ROUTES_BLOCK__

  # ===============================
  # DEFAULT PROXY (LB MODE)
  # ===============================
  __DEFAULT_PROXY_BLOCK__

  # ===============================
  # HEALTHCHECK (LB MODE ONLY)
  # ===============================
  __HEALTHZ_BLOCK__
}
