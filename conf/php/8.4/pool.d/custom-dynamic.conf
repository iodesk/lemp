[custom.com]
user = stack-custom
group = stack-custom

listen = /run/php/php-fpm-custom.com.sock
listen.owner = nginx
listen.group = nginx
listen.mode = 0660
listen.backlog = 8192

pm = dynamic
pm.max_children = 20
pm.start_servers = 8
pm.min_spare_servers = 2
pm.max_spare_servers = 10
pm.max_requests = 1500
pm.process_idle_timeout = 20s

pm.status_path = /status
request_terminate_timeout = 300s

rlimit_files = 131072
rlimit_core = unlimited
catch_workers_output = yes

php_admin_value[open_basedir] = /home/stack-custom/custom.com/public_html:/tmp:/usr/share/php:/usr/lib/php
php_admin_value[session.save_path] = /home/stack-custom/tmp/php_sessions
php_admin_value[error_log] = /home/stack-custom/logs/php/error.log
php_admin_flag[log_errors] = on